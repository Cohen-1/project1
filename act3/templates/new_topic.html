<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>New Topic</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='new_topic.css') }}">

</head>
<body>
    <h2>Create New Topic</h2>
    <form method="POST" action="{{ url_for('new_topic') }}">
        <input type="text" name="title" placeholder="Topic Title" required><br><br>
        <textarea name="description" placeholder="Topic Description" rows="5" required></textarea><br><br>
        <button type="submit">Create Topic</button>
    </form>
    <br>
    <a href="{{ url_for('forum') }}">Back to Forum</a>
</body>
</html>
