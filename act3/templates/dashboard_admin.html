<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
    <div class="top-right">
        
        <a href="{{ url_for('logout') }}" class="logout-button">Logout</a>

    </div>

    <h1>Welcome, Admin ({{ email }})</h1>

    <div class="columns-container">
        <div class="column">
            <h2>Students</h2>
            <ul class="user-list">
                {% for student in students %}
                    <li>
                        <span>{{ student[1] }}</span>
                        <form method="POST" action="{{ url_for('delete_user', user_id=student[0]) }}" class="inline-form">
                            <button type="submit" class="btn btn-remove" onclick="return confirm('Are you sure you want to remove this student?')">Remove</button>
                        </form>
                    </li>
                {% endfor %}
            </ul>
        </div>

        <div class="column">
            <h2>Instructors</h2>
            <ul class="user-list">
                {% for instructor in instructors %}
                    <li>
                        <span>{{ instructor[1] }}</span>
                        <form method="POST" action="{{ url_for('delete_user', user_id=instructor[0]) }}" class="inline-form">
                            <button type="submit" class="btn btn-remove" onclick="return confirm('Are you sure you want to remove this instructor?')">Remove</button>
                        </form>
                    </li>
                {% endfor %}
            </ul>
        </div>
    </div>

</body>
</html>
