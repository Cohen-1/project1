<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h2>Admin Panel</h2>
    <table class="table table-bordered">
        <thead>
            <tr><th>ID</th><th>Email</th><th>Role</th></tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user[0] }}</td>  <!-- user id -->
                <td>{{ user[1] }}</td>  <!-- user email -->
                <td>{{ user[2] }}</td>  <!-- user role -->
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
