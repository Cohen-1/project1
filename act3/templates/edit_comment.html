<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Comment</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='edit.css') }}">
</head>
<body>
  <div class="form-container">
    <h1>Edit Comment</h1>
    <form method="POST" action="{{ url_for('edit_comment') }}">
      <input type="hidden" name="comment_id" value="{{ comment.id }}">
      <textarea name="edited_content" rows="5" cols="50">{{ comment.content }}</textarea><br><br>
      <button type="submit">Update Comment</button>
      <a href="{{ request.referrer or url_for('forum') }}">Cancel</a>
    </form>
  </div>
</body>
</html>
